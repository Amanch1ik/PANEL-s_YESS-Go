version: '3.8'

# Docker Compose конфигурация с Nginx reverse proxy для доменов
# Использование: docker-compose -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d

services:
  # Nginx Reverse Proxy для всех доменов
  nginx:
    image: nginx:1.27-alpine
    container_name: yess-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.domains.conf:/etc/nginx/nginx.conf:ro
      - ./landing:/var/www/landing:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - csharp-backend
      - admin-panel
      - partner-panel
    networks:
      - yess-network-prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  yess-network-prod:
    external: false

